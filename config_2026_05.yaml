data:
  raw_dir: data/raw
  positions: data/repl/positions.parquet
  selected: data/repl/selected.parquet
  depth_traj: data/repl/depth_traj.parquet
  maia_q: data/repl/maia_q.parquet
  train_tensor: data/repl/train.pt
  lichess_month: 2026-05
  hf_repo: Lichess/standard-chess-games
  hf_shards: 2
  sample_seed: 17
  elo_bins:
  - 1200
  - 1400
  - 1600
  - 1800
  - 2000
  - 2200
  - 2400
  - 2600
  time_classes:
  - bullet
  - blitz
  - rapid
  - classical
