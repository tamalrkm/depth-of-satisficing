  min_ply: 9
  max_ply: 120
engine:
  path: ~/projects/stockfish_chess/engine/stockfish
  net: nn-71d6d32cb962.nnue
  threads: 1
  hash_mb: 256
  depth: 21
  multipv: 9
  show_wdl: true
  shared_net: true
  max_nodes: 200000000
